version: 2

models:
  - name: int_listing_funnel
    description: "One row per listing, with aggregated application funnel counts."
    columns:
      - name: listing_id
        data_tests:
          - unique
          - not_null
      - name: total_applications
        data_tests:
          - not_null
      - name: sent_count
        data_tests:
          - not_null
      - name: viewed_count
        data_tests:
          - not_null
      - name: shortlisted_count
        data_tests:
          - not_null
      - name: declined_count
        data_tests:
          - not_null
      - name: withdrawn_count
        data_tests:
          - not_null
      - name: listing_status
        data_tests:
          - accepted_values:
              arguments:
                values: ["active", "rented", "withdrawn"]